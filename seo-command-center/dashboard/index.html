<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEO Command Center — Live Cockpit</title>
<style>
:root {
  --bg: #0a0a0c;
  --frost-bg: rgba(255, 255, 255, 0.03);
  --frost-border: rgba(255, 255, 255, 0.08);
  --frost-highlight: rgba(255, 255, 255, 0.1);
  --text-main: #f8f7f4;
  --text-mute: #a1a1aa;
  --accent: #3b82f6;
  --red: #ef4444;
  --amber: #f59e0b;
  --green: #10b981;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text-main);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}
.container {
  width: 100%;
  max-width: 1100px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
h1 {
  font-size: 20px;
  font-weight: 500;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

.pill {
  font-size: 12px;
  color: var(--text-mute);
  background: var(--frost-bg);
  border: 1px solid var(--frost-border);
  border-radius: 6px;
  padding: 4px 10px;
}

.frost-card {
  background: var(--frost-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--frost-border);
  border-radius: 16px;
  padding: 20px;
  transition: border-color 0.2s ease;
}
.frost-card:hover { border-color: var(--frost-highlight); }
.frost-card h2 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-mute);
  margin: 0 0 16px;
  font-weight: 600;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.stat-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-item b { font-size: 28px; font-weight: 600; color: var(--text-main); }
.stat-item span { font-size: 12px; color: var(--text-mute); }

.main-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 24px;
}
@media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  color: var(--text-mute);
  padding: 8px;
  border-bottom: 1px solid var(--frost-border);
}
td { padding: 10px 8px; border-bottom: 1px solid var(--frost-border); color: var(--text-main); }

.sev {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
}
.sev.high { background: rgba(239, 68, 68, 0.2); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.3); }
.sev.medium { background: rgba(245, 158, 11, 0.2); color: var(--amber); border: 1px solid rgba(245, 158, 11, 0.3); }
.sev.low { background: rgba(161, 161, 170, 0.2); color: var(--text-mute); border: 1px solid rgba(161, 161, 170, 0.3); }

#log {
  height: 400px;
  overflow-y: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#log div {
  padding: 4px 8px;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.02);
  color: var(--text-mute);
  border-left: 2px solid var(--frost-border);
}
#log div.event { color: var(--accent); border-left-color: var(--accent); }

.empty { color: var(--text-mute); font-style: italic; font-size: 13px; text-align: center; padding: 20px; }
</style></head>
<body>
  <div class="container">
    <header>
      <h1><span class="dot"></span>SEO Command Center <span class="pill" id="meta">idle</span></h1>
      <div class="pill" id="urls">0 URLs</div>
    </header>

    <div class="frost-card stats-grid">
      <div class="stat-item"><b id="c-total">0</b><span>Total Issues</span></div>
      <div class="stat-item"><b id="c-high" style="color:var(--red)">0</b><span>High</span></div>
      <div class="stat-item"><b id="c-med" style="color:var(--amber)">0</b><span>Medium</span></div>
      <div class="stat-item"><b id="c-low" style="color:var(--text-mute)">0</b><span>Low</span></div>
    </div>

    <div class="main-grid">
      <div class="frost-card">
        <h2>Issues Detected</h2>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Severity</th><th>Issue Type</th><th>Count</th></tr></thead>
            <tbody id="tbody">
              <tr><td colspan="3" class="empty">Awaiting audit signal...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div style="display:flex; flex-direction:column; gap:24px">
        <div class="frost-card">
          <h2>Event Log</h2>
          <div id="log"><div class="empty">Pipeline stream inactive.</div></div>
        </div>
        <div class="frost-card">
          <h2>Export Status</h2>
          <div id="export" class="empty">report.html pending...</div>
        </div>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
</body></html>
